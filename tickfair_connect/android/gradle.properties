org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Duser.language=en -Duser.country=US
android.useAndroidX=true
# Disable incremental compilation to avoid cross-drive path errors on Windows
# (pub cache on C:\ vs project on D:\ causes IllegalArgumentException in Kotlin compiler)
kotlin.incremental=false
